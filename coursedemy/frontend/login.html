<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Đăng nhập – CourseDemy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div id="toast-container"></div>
<div id="spinner" class="hidden"><div class="spinner-ring"></div></div>

<div class="auth-card">
  <div class="auth-logo">🎓</div>
  <h1 class="auth-title">Đăng nhập</h1>
  <p class="auth-subtitle">Chào mừng trở lại CourseDemy!</p>

  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" class="form-control" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input id="password" type="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full btn-lg">Đăng nhập</button>
  </form>

  <p class="auth-footer">Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a></p>
  <p class="auth-footer" style="margin-top:8px"><a href="/index.html" style="color:var(--text-muted)">← Về trang chủ</a></p>
</div>

<script src="js/api.js"></script>
<script>
// Nếu đã đăng nhập, redirect
if (isLoggedIn()) window.location.href = '/index.html';

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
  showSpinner();

  const { ok, data } = await apiFetch('/auth/login', {
    method: 'POST',
    body: JSON.stringify({
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    })
  });

  hideSpinner(); btn.disabled = false; btn.textContent = 'Đăng nhập';

  if (!ok) { showToast(data.message || 'Đăng nhập thất bại', 'error'); return; }

  setAuth(data.data.token, data.data.user);
  showToast('Đăng nhập thành công!', 'success');

  setTimeout(() => {
    const role = data.data.user.role;
    window.location.href = role === 'admin' ? '/admin.html' : '/index.html';
  }, 600);
});
</script>
</body>
</html>
