<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yêu thích của tôi – CourseDemy</title>
  <meta name="description" content="Danh sách khóa học yêu thích của bạn trên CourseDemy.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Wishlist card: extend course-card with remove button at bottom */
    .wishlist-grid .course-card { position: relative; }
    .wishlist-grid .card-body   { padding-bottom: 12px; }

    /* Spinner inline trong card khi đang xóa */
    .removing { opacity: 0.4; pointer-events: none; transition: opacity 0.2s; }

    /* Count badge */
    .wishlist-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--primary-glow); color: var(--primary);
      border-radius: 100px; padding: 2px 10px;
      font-size: 0.82rem; font-weight: 700; margin-left: 8px;
    }
  </style>
</head>
<body>
<nav id="navbar"></nav>
<div id="toast-container"></div>
<div id="spinner" class="hidden"><div class="spinner-ring"></div></div>

<main class="container">
  <div class="wishlist-header">
    <h1 class="wishlist-title">❤️ Yêu thích của tôi <span class="wishlist-count" id="wish-count" style="display:none">0</span></h1>
    <p class="wishlist-subtitle">Các khóa học bạn đã lưu để học sau.</p>
  </div>

  <div id="wishlist-container">
    <!-- Loading state -->
    <div class="empty-state">
      <div class="spinner-ring"></div>
      <p class="empty-text">Đang tải danh sách yêu thích...</p>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script>
// Bảo vệ trang: chỉ student
if (!requireAuth()) { /* sẽ redirect */ }
else if (!requireRole('student')) { /* sẽ redirect */ }

renderNavbar('wishlist');
loadWishlist();

async function loadWishlist() {
  const container = document.getElementById('wishlist-container');

  // Loading spinner
  container.innerHTML = `<div class="empty-state"><div class="spinner-ring"></div><p class="empty-text">Đang tải...</p></div>`;

  const { ok, data } = await apiFetch('/wishlist');

  if (!ok) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">😕</div>
        <p class="empty-text">Không thể tải danh sách yêu thích. Vui lòng thử lại.</p>
        <button class="btn btn-outline mt-16" onclick="loadWishlist()">🔄 Thử lại</button>
      </div>`;
    return;
  }

  const items = data.data || [];

  // Cập nhật badge count
  const countEl = document.getElementById('wish-count');
  if (items.length > 0) {
    countEl.textContent = items.length;
    countEl.style.display = 'inline-flex';
  } else {
    countEl.style.display = 'none';
  }

  if (!items.length) {
    container.innerHTML = `
      <div class="wishlist-empty">
        <div class="wishlist-empty-icon">💔</div>
        <p class="wishlist-empty-text">Danh sách yêu thích của bạn đang trống.<br>Hãy khám phá các khóa học ngay!</p>
        <a href="/index.html" class="btn btn-primary" style="margin-top:8px">🔍 Khám phá khóa học</a>
      </div>`;
    return;
  }

  // Cập nhật _wishedIds để heart buttons render đúng
  window._wishedIds = new Set(items.map(item => String(item.course?.id ?? item.id)));

  // Render grid
  const cardsHtml = items.map(item => {
    const course = item.course || item;
    return buildWishlistCard(course);
  }).join('');

  container.innerHTML = `<div class="courses-grid wishlist-grid">${cardsHtml}</div>`;
}

function buildWishlistCard(course) {
  const thumb = course.thumbnail
    ? `<img src="${course.thumbnail}" alt="${course.title}" class="card-thumb">`
    : `<div class="card-thumb-placeholder"><span>📚</span></div>`;

  const avg = parseFloat(course.avg_rating) || 0;
  const cnt = parseInt(course.reviews_count) || 0;
  const starHtml = cnt > 0
    ? `<span class="star-display"><span class="stars">${renderStars(avg)}</span> <span class="rating-val">${avg.toFixed(1)}</span> <span class="rating-count">(${cnt} đánh giá)</span></span>`
    : `<span class="star-display"><span class="stars">☆☆☆☆☆</span> <span class="rating-count">Chưa có đánh giá</span></span>`;

  return `
    <div class="course-card" id="wish-card-${course.id}">
      <a href="/course.html?id=${course.id}" class="card-thumb-wrap">${thumb}</a>
      <div class="card-body">
        <h3 class="card-title"><a href="/course.html?id=${course.id}">${course.title}</a></h3>
        <p class="card-instructor">👤 ${course.instructor?.full_name || '—'}</p>
        ${course.category ? `<span class="badge badge-outline">${course.category.name}</span>` : ''}
        ${starHtml}
        <div class="card-footer">
          ${formatPrice(course.price)}
          <a href="/course.html?id=${course.id}" class="btn btn-sm btn-primary">Xem chi tiết</a>
        </div>
        <button class="wishlist-card-remove" onclick="removeFromWishlist(${course.id}, this)" id="remove-btn-${course.id}">
          🗑️ Xóa khỏi yêu thích
        </button>
      </div>
    </div>`;
}

async function removeFromWishlist(courseId, btn) {
  const card = document.getElementById(`wish-card-${courseId}`);
  if (card) card.classList.add('removing');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm" style="border-top-color:var(--danger)"></span> Đang xóa...';

  const { ok, data } = await apiFetch(`/wishlist/${courseId}`, { method: 'DELETE' });

  if (!ok) {
    showToast(data.message || 'Không thể xóa khỏi danh sách yêu thích', 'error');
    if (card) card.classList.remove('removing');
    btn.disabled = false;
    btn.innerHTML = '🗑️ Xóa khỏi yêu thích';
    return;
  }

  showToast('Đã xóa khỏi danh sách yêu thích', 'info');

  // Animate out và reload
  if (card) {
    card.style.transition = 'all 0.3s ease';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9)';
    setTimeout(() => loadWishlist(), 350);
  } else {
    loadWishlist();
  }
}
</script>
</body>
</html>
